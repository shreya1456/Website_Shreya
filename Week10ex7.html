<!DOCTYPE html>
<html>
    <head>
        <title>Table with Alternate Colors</title>
    </head> 
    <body>
        
        <script>
            document.write("<table border='1' cellpadding='10'>"); 

                for (var i=1; 1<=5; i++) { 
                    if (i%2==0) { 
                        document.write("<tr style='background-color: lightgray;'>"); 
                    } else {
                        document.write("<tr style='background-color: lightblue;'>"); 
                    } 
                    document.write("<td>Row " + i+ "</td>"); 
                    document.write("<td>Data " + i + "</td>");
                    document.write("</tr>"); 
                } 
            document.write("</table>"); 
        </script>
    </body>
</html>
