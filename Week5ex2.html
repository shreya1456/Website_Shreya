<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <h1> Example on Unordered List</h1>
    <ul>
        <li>Sportsstar </li>
        <li>Business week</li>
        <li> Time</li>
    </ul>
    <h2>Example on ordered list</h2>
    <ol type="i" start="4">
        <li>Sportsstar</li>
        <li>Business week</li>
        <li>Time</li>
    </ol>
    <h3>Example on Defination List</h3>
    <dl>
        <dt>sports Magazine </dt>
        <dd>Sportsstar
        <dd>
        <dt>Businesss Magazine </dt>
        <dd>Business Week</dd>
    </dl>
</body>

</html>
