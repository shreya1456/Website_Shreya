<!DOCTYPE html> 
<html> 
    <head>
        <title>JS Variables</title>
    </head> 
    <body>
        <script>
            var num=10; 
            var floatNum= 10.5; 
            var str= "Hello"; 
            var bool= true; 

            document.write("Numeric value:" + num + "<br>");
            document.write("Floa value:" + floatNum + "<br>"); 
            document.write("String value:" + str + "<br>");
            document.write("Boolean value:" + bool + "<br>"); 
        </script>
    </body>
</html>
