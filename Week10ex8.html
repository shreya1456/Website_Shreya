<!DOCTYPE html>
<html>
    <head>
        <title>Array Join Example</title>
    </head> 
    <body>
        <h2>Join Array Elements</h2>
        <script>
            var myColor=["Red","Green","Black","White"]; 

            document.write(myColor.toString() + "<br>"); 
            document.write(myColor.join("+") + "<br>");
            document.write(myColor.join(" + ") + "<br>"); 
        </script>
    </body>

</html>
