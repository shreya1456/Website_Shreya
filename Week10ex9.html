<!DOCTYPE html>
<html>
    <head>
        <title>Sum and Product of Array</title> 
    </head> 
    <body>
        
        <h2>Array Sum and Product</h2> 

        <script>
            var numbers = [2,3,4,5]; 
            var sum = 0; 
            var product= 1; 
            for (var i=0; i < numbers.length; i++){ 
                sum= sum+ numbers[i]; 
                product= product* numbers[i]; 
            } 

            document.write("Array: " + numbers + "<br>");
            document.write("Sum: " + sum + "<br>"); 
            document.write("Product: " + product + "<br>");
        </script>
    </body>
</html>
