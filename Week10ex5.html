<!DOCTYPE html>
<html>
    <head>
        <title>For Loop Images</title>
    </head>
    <body>
        <script>
            for (var i = 1; i <= 4; i++) {
                document.write("<img src='" + i + ".jpg' width='450' height='450' style='margin:10px;'>");  
            }
        </script>
    </body>
</html>
