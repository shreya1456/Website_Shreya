<!DOCTYPE html>
<html>

<head>
    <title>HTML Form Test</title>
    <style>
        body {
            font-family: Arial, sans-serif;
        }

        .container {
            width: 600px;
            margin: 50px auto;
            border: 2px solid black;
            padding: 20px;
        }

        h2 {
            margin-bottom: 20px;
        }

        table {
            width: 100%;
        }

        td {
            padding: 10px;
            vertical-align: top;
        }

        input[type="text"],
        textarea,
        select {
            width: 100%;
            padding: 5px;
        }

        textarea {
            height: 120px;
        }

        .buttons {
            text-align: center;
        }
    </style>
</head>

<body>

    <div class="container">
        <h2>HTML Form Test</h2>

        <form>
            <table>
                <tr>
                    <td>Name</td>
                    <td><input type="text" name="name"></td>
                </tr>

                <tr>
                    <td>Address</td>
                    <td><input type="text" name="address"></td>
                </tr>

                <tr>
                    <td>Email</td>
                    <td><input type="text" name="email"></td>
                </tr>

                <tr>
                    <td>Gender</td>
                    <td>
                        <input type="radio" name="gender"> Male
                        <input type="radio" name="gender"> Female
                    </td>
                </tr>

                <tr>
                    <td>Hobbies</td>
                    <td>
                        <input type="checkbox"> Sports
                        <input type="checkbox"> Movies
                        <input type="checkbox"> Travelling
                    </td>
                </tr>

                <tr>
                    <td>Country</td>
                    <td>
                        <select>
                            <option>Nepal</option>
                            <option>India</option>
                            <option>China</option>
                            <option>USA</option>
                        </select>
                    </td>
                </tr>

                <tr>
                    <td>Message</td>
                    <td>
                        <textarea></textarea>
                    </td>
                </tr>

                <tr>
                    <td colspan="2" class="buttons">
                        <input type="submit" value="Submit">
                        <input type="reset" value="Reset">
                    </td>
                </tr>
            </table>
        </form>
    </div>

</body>

</html>
