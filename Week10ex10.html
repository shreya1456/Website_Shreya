<!DOCTYPE html>
<html>
<head>
    <title>Rectangle Area</title> 
</head> 
<body>
    <h2>Calculate Area of Rectangle</h2> 

    <script>
        function calculateRectangle(length, breadth) {
            return length * breadth;
        } 

        var l= 10; 
        var b= 5; 
        var area = calculateRectangle(l, b); 

        document.write("Length: " + l + "<br>");
        document.write("Breadth: " + b + "<br>");
        document.write("Area of Rectangle: " + area + "<br>");  
    </script>
</body>
</html>
